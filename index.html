<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Arcade Snake</title>
    <style>
        body {
            background-color: #111;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            text-shadow: 0 0 10px #00ff66;
            margin-bottom: 10px;
        }
        #score-board {
            display: flex;
            gap: 30px;
            font-size: 1.2rem;
            margin-bottom: 15px;
            text-shadow: 0 0 5px #00ff66;
        }
        canvas {
            border: 4px solid #00ff66;
            background-color: #000;
            box-shadow: 0 0 20px #00ff66;
        }
        #controls-tip {
            margin-top: 15px;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <h1>SNAKE ARCADE</h1>
    <div id="score-board">
        <div>SCORE: <span id="score">0</span></div>
        <div>HIGH SCORE: <span id="high-score">0</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="controls-tip">Use Arrow Keys to Navigate. Press Space to Restart.</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 1;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        document.getElementById("high-score").innerText = highScore;

        let gameInterval;
        let gameRunning = true;

        window.addEventListener("keydown", handleKeyPress);
        startGame();

        function startGame() {
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(updateGame, 100);
        }

        function updateGame() {
            if (!gameRunning) return;

            // Move Snake Head
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Game Over Conditions (Wall collision or Self collision)
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || checkSelfCollision(head)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Check Food Collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById("score").innerText = score;
                generateFood();
            } else {
                snake.pop(); // Remove tail if no food eaten
            }

            drawGrid();
        }

        function drawGrid() {
            // Clear Canvas
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Snake
            ctx.fillStyle = "#00ff66";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#00ff66";
            snake.forEach(part => ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2));

            // Draw Food
            ctx.fillStyle = "#ff0055";
            ctx.shadowColor = "#ff0055";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
            
            ctx.shadowBlur = 0; // Reset shadow
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            // Ensure food doesn't spawn on snake
            if (snake.some(part => part.x === food.x && part.y === food.y)) {
                generateFood();
            }
        }

        function checkSelfCollision(head) {
            return snake.some((part, index) => index !== 0 && part.x === head.x && part.y === head.y);
        }

        function handleKeyPress(e) {
            if (e.key === " " && !gameRunning) {
                resetGame();
                return;
            }
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (e.key === "ArrowLeft" && !goingRight) { dx = -1; dy = 0; }
            if (e.key === "ArrowUp" && !goingDown) { dx = 0; dy = -1; }
            if (e.key === "ArrowRight" && !goingLeft) { dx = 1; dy = 0; }
            if (e.key === "ArrowDown" && !goingUp) { dx = 0; dy = 1; }
        }

        function gameOver() {
            gameRunning = false;
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#ff0055";
            ctx.font = "30px 'Courier New'";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 10);
            
            ctx.fillStyle = "#00ff66";
            ctx.font = "16px 'Courier New'";
            ctx.fillText("Press SPACE to Restart", canvas.width / 2, canvas.height / 2 + 30);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem("snakeHighScore", highScore);
                document.getElementById("high-score").innerText = highScore;
            }
        }

        function resetGame() {
            snake = [{x: 10, y: 10}];
            dx = 1;
            dy = 0;
            score = 0;
            document.getElementById("score").innerText = score;
            generateFood();
            gameRunning = true;
        }
    </script>
</body>
</html>
