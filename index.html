<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eliasports - Motorbike Racing</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            background-color: #050510;
            color: #00ffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            overflow: hidden;
        }
        h1 { text-shadow: 0 0 10px #00ffff; margin: 5px 0; font-size: 1.6rem; text-transform: uppercase; }
        #hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 600px;
            font-size: 1rem;
            margin-bottom: 5px;
            text-shadow: 0 0 5px #00ffff;
            background: rgba(0, 255, 255, 0.1);
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #00ffff;
        }
        canvas {
            border: 3px solid #00ffff;
            background: linear-gradient(#0a0a20, #020205);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            max-width: 100%;
            height: auto;
        }
        #mobile-controls {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            width: 100%;
            max-width: 400px;
        }
        .control-btn {
            flex: 1;
            height: 60px;
            background: #000;
            border: 2px solid #00ffff;
            color: #00ffff;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            box-shadow: 0 0 5px #00ffff;
        }
        .control-btn:active {
            background: #00ffff;
            color: #000;
        }
        #leaderboard {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #fff;
            text-align: left;
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>eliasports Racing</h1>
    <div id="hud">
        <div>TIME LEFT: <span id="timer">05:00</span></div>
        <div>POS: <span id="position">10/10</span></div>
        <div>DIST: <span id="distance">0%</span></div>
    </div>
    
    <canvas id="raceCanvas" width="600" height="300"></canvas>
    
    <div id="mobile-controls">
        <button class="control-btn" id="btn-brake">BRAKE</button>
        <button class="control-btn" id="btn-gas">GAS (ACCEL)</button>
    </div>

    <div id="leaderboard">LIVE POSITIONS: Loading...</div>

    <script>
        const canvas = document.getElementById("raceCanvas");
        const ctx = canvas.getContext("2d");

        // Game Configuration
        const trackLength = 15000; // Finish line distance units
        let timeLeft = 300; // 5 minutes in seconds
        let gameRunning = true;
        let gameResult = "";

        // Controls
        let keys = { ArrowRight: false, ArrowLeft: false };
        
        // Setup 10 Racers (Index 0 is Player, 1-9 are AI Bots)
        const colors = ["#00ff66", "#ff0055", "#ffff00", "#ff00ff", "#00ffff", "#ff9900", "#ffffff", "#9933ff", "#0033ff", "#ff5555"];
        let racers = [];
        
        for(let i = 0; i < 10; i++) {
            racers.push({
                id: i,
                name: i === 0 ? "YOU (eliasports)" : "Racer " + (i + 1),
                x: 0,
                y: 0,
                speed: 0,
                maxSpeed: i === 0 ? 12 : 9.5 + Math.random() * 2, // Player can go slightly faster if managing terrain well
                accel: 0.1 + (Math.random() * 0.05),
                color: colors[i],
                rank: 10
            });
        }

        // Terrain Formula (Hills & Valleys definition)
        function getTerrainHeight(x) {
            // Generates smooth overlapping hills using sine waves
            return 220 + Math.sin(x * 0.005) * 40 + Math.cos(x * 0.002) * 30;
        }

        // Event Listeners for Desktop Keyboard
        window.addEventListener("keydown", (e) => {
            if(e.key === "ArrowRight") keys.ArrowRight = true;
            if(e.key === "ArrowLeft") keys.ArrowLeft = true;
            if(e.key === " " && !gameRunning) resetGame();
        });
        window.addEventListener("keyup", (e) => {
            if(e.key === "ArrowRight") keys.ArrowRight = false;
            if(e.key === "ArrowLeft") keys.ArrowLeft = false;
        });

        // Touch Control Triggers for Mobile
        document.getElementById("btn-gas").addEventListener("touchstart", () => keys.ArrowRight = true);
        document.getElementById("btn-gas").addEventListener("touchend", () => keys.ArrowRight = false);
        document.getElementById("btn-brake").addEventListener("touchstart", () => keys.ArrowLeft = true);
        document.getElementById("btn-brake").addEventListener("touchend", () => keys.ArrowLeft = false);
        canvas.addEventListener("click", () => { if(!gameRunning) resetGame(); });

        // Countdown Timer Engine (Per Second)
        const timerInterval = setInterval(() => {
            if (!gameRunning) return;
            timeLeft--;
            
            let mins = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            let secs = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById("timer").innerText = `${mins}:${secs}`;

            if (timeLeft <= 0) {
                endGame(false, "TIME UP! GAME OVER");
            }
        }, 1000);

        // Core Loop
        function tick() {
            update();
            draw();
            if (gameRunning) requestAnimationFrame(tick);
        }

        function update() {
            // 1. Move Player
            let player = racers[0];
            if (keys.ArrowRight) {
                player.speed = Math.min(player.speed + player.accel, player.maxSpeed);
            } else if (keys.ArrowLeft) {
                player.speed = Math.max(player.speed - 0.3, 0); // Active braking
            } else {
                player.speed = Math.max(player.speed - 0.05, 0); // Coasting friction
            }
            player.x += player.speed;

            // 2. Move AI Bots
            for(let i = 1; i < racers.length; i++) {
                let bot = racers[i];
                // Simple AI accelerating naturally up to their designated speed caps
                bot.speed = Math.min(bot.speed + bot.accel, bot.maxSpeed);
                bot.x += bot.speed;
            }

            // Bind all racers safely onto the dynamic hill curves
            racers.forEach(r => {
                r.y = getTerrainHeight(r.x);
            });

            // 3. Dynamic Standings & Rank System
            let sorted = [...racers].sort((a, b) => b.x - a.x);
            sorted.forEach((racer, index) => {
                let actualRacer = racers.find(r => r.id === racer.id);
                actualRacer.rank = index + 1;
            });

            // Update Screen Stats Indicators
            document.getElementById("position").innerText = player.rank + "/10";
            let pct = Math.min(Math.floor((player.x / trackLength) * 100), 100);
            document.getElementById("distance").innerText = pct + "%";

            // Print real-time ticker feed text
            let rankingText = sorted.slice(0, 5).map((r, idx) => `${idx+1}. ${r.name}`).join(" | ");
            document.getElementById("leaderboard").innerText = "TOP 5: " + rankingText;

            // Check Win Condition
            if (player.x >= trackLength) {
                endGame(true, `FINISH! You placed #${player.rank}!`);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let cameraX = racers[0].x - 100; // Camera tracking stays centered safely behind player profile

            // Draw Parallax Hill Road Grid Surfaces 
            ctx.fillStyle = "#151530";
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            for (let screenX = 0; screenX <= canvas.width; screenX += 5) {
                let worldX = screenX + cameraX;
                let groundY = getTerrainHeight(worldX);
                ctx.lineTo(screenX, groundY);
            }
            ctx.lineTo(canvas.width, canvas.height);
            ctx.fill();

            // Highlight Road Finish Line Boundary
            let finishLineScreenX = trackLength - cameraX;
            if(finishLineScreenX >= 0 && finishLineScreenX <= canvas.width) {
                ctx.strokeStyle = "#ff0055";
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(finishLineScreenX, 0);
                ctx.lineTo(finishLineScreenX, canvas.height);
                ctx.stroke();
                ctx.fillStyle = "#ff0055";
                ctx.font = "bold 12px Arial";
                ctx.fillText("FINISH LINE", finishLineScreenX - 35, 30);
            }

            // Draw the 10 Motorbike Entities
            racers.forEach(r => {
                let screenX = r.x - cameraX;
                // Only render bikes inside active camera sight window frame boundaries
                if (screenX >= -20 && screenX <= canvas.width + 20) {
                    ctx.fillStyle = r.color;
                    
                    // Simple retro motorbike rectangle model chassis layout
                    ctx.fillRect(screenX, r.y - 15, 16, 10); 
                    
                    // Wheels
                    ctx.fillStyle = "#ffffff";
